<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuckyMax — честные розыгрыши в MAX</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            font-size: 3em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        h1 span {
            font-size: 1.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecf2 100%);
            border-radius: 20px;
            padding: 20px 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-value {
            font-size: 2.2em;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .prize-section {
            background: linear-gradient(135deg, #fff5e6 0%, #ffe0cc 100%);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            border: 2px solid #ff9800;
            box-shadow: 0 10px 20px rgba(255, 152, 0, 0.2);
        }

        .prize-title {
            color: #ff6b00;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 1.2em;
        }

        .prize-name {
            font-size: 2em;
            font-weight: bold;
            color: #333;
            word-break: break-word;
        }

        .participants-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
        }

        .section-title {
            font-size: 1.3em;
            margin-bottom: 15px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .participants-list {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 15px;
            padding: 10px;
        }

        .participant-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-bottom: 1px solid #f0f0f0;
        }

        .participant-item:last-child {
            border-bottom: none;
        }

        .participant-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .participant-name {
            flex: 1;
            color: #333;
        }

        .pick-button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px;
            font-size: 1.3em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .pick-button:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .pick-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .winner-card {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            border-radius: 50px;
            padding: 30px;
            text-align: center;
            animation: pulse 2s infinite;
            box-shadow: 0 20px 40px rgba(253, 160, 133, 0.4);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .winner-label {
            color: white;
            font-size: 1.2em;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .winner-name {
            color: white;
            font-size: 2.5em;
            font-weight: bold;
            word-break: break-word;
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #f00;
            position: fixed;
            top: -10px;
            animation: fall linear forwards;
            z-index: 1000;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(720deg);
            }
        }

        .hidden {
            display: none;
        }

        @media (max-width: 480px) {
            .container { padding: 20px; }
            h1 { font-size: 2.2em; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span>🎲</span>
            LuckyMax
            <span>🎲</span>
        </h1>
        <div class="subtitle">Честные розыгрыши в MAX</div>

        <!-- Статистика -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="participantsCount">0</div>
                <div class="stat-label">участников</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="winnersCount">1</div>
                <div class="stat-label">победителей</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="timeLeft">∞</div>
                <div class="stat-label">осталось</div>
            </div>
        </div>

        <!-- Приз -->
        <div class="prize-section">
            <div class="prize-title">🎁 Главный приз</div>
            <div class="prize-name" id="prize">iPhone 15 Pro Max</div>
        </div>

        <!-- Список участников -->
        <div class="participants-section">
            <div class="section-title">
                <span>👥</span>
                Участники розыгрыша
            </div>
            <div class="participants-list" id="participantsList">
                <div class="participant-item">
                    <div class="participant-avatar">A</div>
                    <div class="participant-name">Алексей</div>
                </div>
                <div class="participant-item">
                    <div class="participant-avatar">М</div>
                    <div class="participant-name">Мария</div>
                </div>
                <div class="participant-item">
                    <div class="participant-avatar">Д</div>
                    <div class="participant-name">Дмитрий</div>
                </div>
                <div class="participant-item">
                    <div class="participant-avatar">Е</div>
                    <div class="participant-name">Елена</div>
                </div>
                <div class="participant-item">
                    <div class="participant-avatar">И</div>
                    <div class="participant-name">Иван</div>
                </div>
                <div class="participant-item">
                    <div class="participant-avatar">О</div>
                    <div class="participant-name">Ольга</div>
                </div>
                <div class="participant-item">
                    <div class="participant-avatar">П</div>
                    <div class="participant-name">Павел</div>
                </div>
                <div class="participant-item">
                    <div class="participant-avatar">Н</div>
                    <div class="participant-name">Наталья</div>
                </div>
                <div class="participant-item">
                    <div class="participant-avatar">С</div>
                    <div class="participant-name">Сергей</div>
                </div>
                <div class="participant-item">
                    <div class="participant-avatar">А</div>
                    <div class="participant-name">Анна</div>
                </div>
            </div>
        </div>

        <!-- Кнопка выбора победителя -->
        <button class="pick-button" onclick="pickWinner()" id="pickBtn">
            <span>🎲</span>
            Выбрать победителя
            <span>🎲</span>
        </button>

        <!-- Карточка победителя (скрыта) -->
        <div id="winnerCard" class="winner-card hidden">
            <div class="winner-label">🏆 ПОБЕДИТЕЛЬ 🏆</div>
            <div class="winner-name" id="winnerName">Имя</div>
        </div>
    </div>

    <script>
        const participants = [
            "Алексей", "Мария", "Дмитрий", "Елена", "Иван",
            "Ольга", "Павел", "Наталья", "Сергей", "Анна"
        ];

        // Обновляем счётчик
        document.getElementById('participantsCount').textContent = participants.length;

        // Функция для конфетти
        function createConfetti() {
            const colors = ['#f00', '#0f0', '#00f', '#ff0', '#f0f', '#0ff'];
            for (let i = 0; i < 100; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.width = Math.random() * 10 + 5 + 'px';
                    confetti.style.height = confetti.style.width;
                    confetti.style.animationDuration = Math.random() * 2 + 2 + 's';
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 4000);
                }, i * 10);
            }
        }

        // Функция выбора победителя
        function pickWinner() {
            const winnerIndex = Math.floor(Math.random() * participants.length);
            const winner = participants[winnerIndex];

            // Показываем карточку победителя
            document.getElementById('winnerName').textContent = winner;
            document.getElementById('winnerCard').classList.remove('hidden');

            // Блокируем кнопку
            const btn = document.getElementById('pickBtn');
            btn.disabled = true;
            btn.innerHTML = '<span>🎉</span> Победитель выбран! <span>🎉</span>';

            // Запускаем конфетти
            createConfetti();

            // Плавная прокрутка к победителю
            setTimeout(() => {
                document.getElementById('winnerCard').scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 100);
        }

        // Обновляем время (для демо)
        function updateTimeLeft() {
            const timeLeft = document.getElementById('timeLeft');
            const hours = Math.floor(Math.random() * 24);
            const minutes = Math.floor(Math.random() * 60);
            timeLeft.textContent = `${hours}ч ${minutes}м`;
        }

        updateTimeLeft();
        setInterval(updateTimeLeft, 60000);
    </script>
</body>
</html>
